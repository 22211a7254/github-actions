name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request: # Note: Secrets will fail here if triggered from a forked repository!
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # --- THE DEBUG STEP ---
    - name: Debug - Verify Secrets are Loaded
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
          echo "❌ ERROR: DOCKER_USERNAME is empty!"
          echo "Check GitHub Settings -> Secrets and variables -> Actions -> Repository Secrets"
          exit 1
        else
          echo "✅ DOCKER_USERNAME is successfully loaded."
        fi

        if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo "❌ ERROR: DOCKER_PASSWORD is empty!"
          exit 1
        else
          echo "✅ DOCKER_PASSWORD is successfully loaded."
        fi

    # --- YOUR ORIGINAL LOGIN STEP ---
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # --- YOUR BUILD & PUSH (Combined with &&) ---
    - name: Build and Push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:latest . && \
        docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:latest
